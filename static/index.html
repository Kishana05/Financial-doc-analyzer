<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinSight AI — Financial Document Analyzer</title>
    <meta name="description"
        content="AI-powered financial document analysis. Upload a PDF and get instant investment insights, risk assessments, and trend analysis." />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            950: '#050d1a',
                            900: '#0a1628',
                            800: '#0f2040',
                            700: '#162b55',
                            600: '#1e3a6e',
                        },
                        accent: {
                            DEFAULT: '#3b82f6',
                            light: '#60a5fa',
                            glow: '#1d4ed8',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 2s linear infinite',
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                        slideUp: { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX transpiler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Marked (Markdown parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #050d1a;
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1628;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e3a6e;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .glow-blue {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }

        .glow-green {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
        }

        .glow-red {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
        }

        .drop-zone-active {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.08) !important;
        }

        .result-content {
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .result-content h1,
        .result-content h2,
        .result-content h3 {
            color: #fff;
            margin: 1.2em 0 0.5em;
            font-weight: 600;
            word-break: break-word;
        }

        .result-content h1 {
            font-size: 1.4em;
            border-bottom: 1px solid #1e3a6e;
            padding-bottom: 0.3em;
        }

        .result-content h2 {
            font-size: 1.2em;
        }

        .result-content h3 {
            font-size: 1.05em;
            color: #bfdbfe;
        }

        .result-content p {
            color: #fff;
            line-height: 1.75;
            margin: 0.6em 0;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .result-content ul,
        .result-content ol {
            color: #fff;
            padding-left: 1.4em;
            margin: 0.5em 0;
        }

        .result-content li {
            margin: 0.3em 0;
            line-height: 1.65;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .result-content strong {
            color: #fff;
            font-weight: 600;
        }

        .result-content em {
            color: #e2e8f0;
        }

        .result-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 0.9em;
            table-layout: fixed;
            word-break: break-word;
        }

        .result-content th {
            background: #0f2040;
            color: #fff;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid #1e3a6e;
            font-weight: 600;
            word-break: break-word;
        }

        .result-content td {
            padding: 9px 14px;
            border-bottom: 1px solid #162b55;
            color: #fff;
            word-break: break-word;
        }

        .result-content tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .result-content code {
            background: #0f2040;
            color: #93c5fd;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            word-break: break-all;
        }

        .result-content blockquote {
            border-left: 3px solid #3b82f6;
            margin: 0.8em 0;
            padding: 0.5em 1em;
            background: rgba(59, 130, 246, 0.07);
            border-radius: 0 6px 6px 0;
        }

        .result-content blockquote p {
            margin: 0;
            color: #e2e8f0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel" src="/static/App.jsx"></script>
</body>

</html>
